messages:
  join: "&8[&a+&8] {prefix} &f{player}"
  quit: "&8[&c-&8] {prefix} &f{player}"
  motd: |
    &8&m---------&r &6Welcome to the Server&r &8&m---------
    &eHello, &f{player}&e! Enjoy your stay.
    &8&m---------------------------------
  chat-format: "{prefix} &f{player}&7: {color}{message}"

ranks:
