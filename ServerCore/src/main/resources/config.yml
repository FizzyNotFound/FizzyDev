    color: "&b"
    weight: 10
  mvp:
    prefix: "&d[MVP]&r"
    color: "&d"
    weight: 20
  mod:
    prefix: "&a[Mod]&r"
    color: "&a"
    weight: 50
  admin:
    prefix: "&c[Admin]&r"
    color: "&c"
