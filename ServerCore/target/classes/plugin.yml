name: ServerCore
version: 1.0.0
main: dev.servercore.ServerCore
api-version: '1.20'
description: A custom core plugin for server management.
authors: [YourName]

commands:
  spawn:
    description: Teleport to the server spawn point.
  setspawn:
    description: Set the current location as spawn.
    permission: core.setspawn
  warp:
    description: Teleport to a saved warp.
  delwarp:
    description: Delete a warp location.
    permission: core.delwarp
  tpa:
    description: Request to teleport to a player.
  tpaccept:
    description: Accept a pending teleport request.
  mute:
    description: Mute a player in chat.
    permission: core.mute
  unmute:
    description: Unmute a player.
    permission: core.mute
  freeze:
    description: Freeze a player in place.
    permission: core.freeze
  vanish:
    description: Become invisible to other players.
    permission: core.vanish
  clearchat:
    description: Clear the global chat.
    permission: core.clearchat
  invsee:
    description: View and edit player inventories.
    permission: core.invsee
  broadcast:
    description: Send a server-wide alert.
    permission: core.broadcast
  stats:
    description: View player stats.
  rank:
    description: Manage player ranks and prefixes.
    permission: core.rank.set
  fly:
    description: Toggle flight mode.
    permission: core.fly
  ping:
    description: Check your connection latency.

permissions:
  core.setspawn:
    description: Allows setting the spawn point.
    default: op
  core.delwarp:
    description: Allows deleting warps.
    default: op
  core.mute:
    description: Allows muting/unmuting players.
    default: op
  core.freeze:
    description: Allows freezing players.
    default: op
  core.vanish:
    description: Allows using vanish.
    default: op
  core.clearchat:
    description: Allows clearing chat.
    default: op
  core.invsee:
    description: Allows viewing inventories.
    default: op
  core.broadcast:
    description: Allows broadcasting messages.
    default: op
  core.rank.set:
    description: Allows changing player ranks.
    default: op
  core.fly:
    description: Allows toggling fly.
    default: op